name: CI

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-pack:
    runs-on: ubuntu-latest
    env:
      NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore package project
        run: dotnet restore src/Italbytz.Bt.Abstractions/Italbytz.Bt.Abstractions.csproj

      - name: Build package project
        run: dotnet build src/Italbytz.Bt.Abstractions/Italbytz.Bt.Abstractions.csproj --configuration Release --no-restore --verbosity minimal

      - name: Pack package
        run: dotnet pack src/Italbytz.Bt.Abstractions/Italbytz.Bt.Abstractions.csproj --configuration Release --no-build --verbosity minimal --output ./artifacts/packages

      - name: Upload NuGet packages
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: |
            artifacts/packages/*.nupkg
            artifacts/packages/*.snupkg
          if-no-files-found: error

      - name: Publish NuGet packages
        if: github.event_name != 'pull_request' && startsWith(github.ref, 'refs/tags/v') && env.NUGET_API_KEY != ''
        run: |
          shopt -s nullglob
          for package in artifacts/packages/*.nupkg; do
            dotnet nuget push "$package" --api-key "$NUGET_API_KEY" --source https://api.nuget.org/v3/index.json --skip-duplicate
          done

      - name: Publish NuGet symbol packages
        if: github.event_name != 'pull_request' && startsWith(github.ref, 'refs/tags/v') && env.NUGET_API_KEY != ''
        run: |
          shopt -s nullglob
          for package in artifacts/packages/*.snupkg; do
            dotnet nuget push "$package" --api-key "$NUGET_API_KEY" --source https://api.nuget.org/v3/index.json --skip-duplicate
          done
